services:
  postgres:
    image: postgres:16
    container_name: loqim_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: loqim
      POSTGRES_PASSWORD: loqim123
      POSTGRES_DB: loqim_db
    ports:
      - "5432:5432"
    volumes:
      - loqim_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: loqim_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - loqim_redis_data:/data

volumes:
  loqim_postgres_data:
  loqim_redis_data: